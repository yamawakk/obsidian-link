<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Obsidianへ転送</title>
<style>
  body { font-family: -apple-system, "Hiragino Sans", sans-serif;
         margin: 0; padding: 2.5rem 1.5rem; text-align: center;
         background: #f5f5f4; color: #1c1917; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1917; color: #e7e5e4; }
    .file { background: #292524 !important; }
  }
  h1 { font-size: 1.15rem; }
  .file { display: inline-block; margin: 0.8rem auto; padding: 0.5rem 0.9rem;
          background: #e7e5e4; border-radius: 8px; font-size: 0.85rem;
          word-break: break-all; max-width: 100%; }
  a.btn { display: inline-block; margin-top: 1rem; padding: 0.9rem 2rem;
          background: #7c3aed; color: #fff; text-decoration: none;
          border-radius: 10px; font-size: 1.05rem; font-weight: 600; }
  p.note { margin-top: 2rem; font-size: 0.75rem; opacity: 0.6; line-height: 1.6; }
</style>
</head>
<body>
<h1>📓 Obsidian へ転送します</h1>
<div class="file" id="file">（ファイル指定がありません）</div>
<div><a class="btn" id="go" href="#" hidden>📱 Obsidianで開く</a></div>
<p class="note" id="note">
  このページは「Slackのリンク → Obsidianアプリ」への乗り換え口です。<br>
  ファイル名は「#」より後ろに載っているため、この端末の中でだけ処理され、<br>
  どのサーバーにも送信されません（このページに保存機能はありません）。<br>
  自動で開かないときは上の紫のボタンを押してください。
</p>
<script>
(function () {
  var params = new URLSearchParams(location.hash.slice(1));
  var vault = params.get("v") || "life-hub";
  var file = params.get("f") || "";
  if (!file) { return; }
  var uri = "obsidian://open?vault=" + encodeURIComponent(vault) +
            "&file=" + encodeURIComponent(file);
  document.getElementById("file").textContent = file;
  var btn = document.getElementById("go");
  btn.href = uri;
  btn.hidden = false;
  // 自動転送（ブラウザが拒否したときのためにボタンも残す）
  location.href = uri;
})();
</script>
</body>
</html>
